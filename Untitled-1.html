<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calendar-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 400px;
            width: 100%;
        }

        .calendar-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .calendar-title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .current-month {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day-header {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 15px 5px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 10px;
        }

        .day-cell {
            padding: 15px 5px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
        }

        .day-cell:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        .day-cell.other-month {
            color: #ccc;
        }

        .day-cell.today {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
            font-weight: bold;
        }

        .day-cell.selected {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            font-weight: bold;
        }

        .day-cell.event {
            position: relative;
        }

        .day-cell.event::after {
            content: '●';
            position: absolute;
            top: 5px;
            right: 5px;
            color: #ff6b6b;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .calendar-container {
                padding: 20px;
            }
            
            .calendar-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <div class="calendar-title" id="calendarTitle">December 2024</div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn">‹ Prev</button>
                <div class="current-month" id="currentMonth"></div>
                <button class="nav-btn" id="nextBtn">Next ›</button>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid">
            <!-- Days headers and cells will be generated by JavaScript -->
        </div>
        <div style="text-align: center; margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px;">
            <div id="selectedDate" style="font-weight: 600; color: #333; font-size: 16px;"></div>
        </div>
    </div>

    <script>
        class Calendar {
            constructor() {
                this.currentDate = new Date();
                this.selectedDate = new Date();
                this.init();
            }

            init() {
                this.renderHeader();
                this.renderCalendar();
                this.attachEvents();
            }

            renderHeader() {
                const title = document.getElementById('calendarTitle');
                const monthYear = this.currentDate.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long' 
                });
                title.textContent = monthYear;
            }

            renderCalendar() {
                const grid = document.getElementById('calendarGrid');
                grid.innerHTML = '';

                // Day headers
                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                days.forEach(day => {
                    const dayHeader = document.createElement('div');
                    dayHeader.className = 'day-header';
                    dayHeader.textContent = day;
                    grid.appendChild(dayHeader);
                });

                // Calendar days
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const startDate = new Date(firstDay);
                startDate.setDate(startDate.getDate() - firstDay.getDay());

                const endDate = new Date(lastDay);
                endDate.setDate(endDate.getDate() + (6 - lastDay.getDay()));

                for (let date = startDate; date <= endDate; date.setDate(date.getDate() + 1)) {
                    const dayCell = document.createElement('div');
                    dayCell.className = 'day-cell';
                    dayCell.textContent = date.getDate();
                    dayCell.dataset.date = date.toDateString();

                    // Style classes
                    if (date.getMonth() !== month) {
                        dayCell.classList.add('other-month');
                    }
                    if (this.isToday(date)) {
                        dayCell.classList.add('today');
                    }
                    if (this.isSelected(date)) {
                        dayCell.classList.add('selected');
                    }
                    if (this.hasEvent(date)) {
                        dayCell.classList.add('event');
                    }

                    grid.appendChild(dayCell);
                }
            }

            isToday(date) {
                const today = new Date();
                return date.toDateString() === today.toDateString();
            }

            isSelected(date) {
                return date.toDateString() === this.selectedDate.toDateString();
            }

            hasEvent(date) {
                // Sample events - you can customize this
                const events = [
                    new Date(2024, 11, 15), // Dec 15
                    new Date(2024, 11, 25)  // Dec 25
                ];
                return events.some(event => event.toDateString() === date.toDateString());
            }

            attachEvents() {
                document.getElementById('prevBtn').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() - 1);
                    this.renderHeader();
                    this.renderCalendar();
                });

                document.getElementById('nextBtn').addEventListener('click', () => {
                    this.currentDate.setMonth(this.currentDate.getMonth() + 1);
                    this.renderHeader();
                    this.renderCalendar();
                });

                document.getElementById('calendarGrid').addEventListener('click', (e) => {
                    if (e.target.classList.contains('day-cell')) {
                        this.selectedDate = new Date(e.target.dataset.date);
                        this.renderCalendar();
                        this.updateSelectedDateDisplay();
                    }
                });
            }

            updateSelectedDateDisplay() {
                const selectedDateDiv = document.getElementById('selectedDate');
                selectedDateDiv.textContent = `Selected: ${this.selectedDate.toLocaleDateString('en-US', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                })}`;
            }
        }

        // Initialize calendar when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new Calendar();
        });
    </script>
</body>
</html>
